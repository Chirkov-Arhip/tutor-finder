<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сравнение репетиторов — TutorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .compare-table {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .compare-table th {
            background: #0d6efd;
            color: #fff;
            font-weight: 600;
            text-align: center;
            padding: 16px;
            font-size: 0.95rem;
        }
        .compare-table th .tutor-name {
            font-size: 1.05rem;
            font-weight: 700;
        }
        .compare-table td {
            padding: 14px 16px;
            vertical-align: middle;
            text-align: center;
        }
        .compare-table tr:nth-child(even) td {
            background: #f8f9fa;
        }
        .row-label {
            font-weight: 600;
            text-align: left !important;
            color: #495057;
            background: #fff !important;
            width: 160px;
            white-space: nowrap;
        }
        .best-val {
            color: #0d6efd;
            font-weight: 700;
        }
        .badge-subject {
            display: inline-block;
            background: #e8f0fe;
            color: #0d6efd;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.8rem;
            margin: 2px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary position-relative">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/images/icon.png" alt="TutorFinder">
            </a>
            <a class="navbar-brand position-absolute start-50 translate-middle-x" href="/">TutorFinder</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/student/tutors.html">← Назад к поиску</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4">Сравнение репетиторов</h2>
        <div id="compareContent"></div>
    </div>

    <script>
        function pluralYears(n) {
            if (n % 10 === 1 && n % 100 !== 11) return 'год';
            if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'года';
            return 'лет';
        }

        function renderCompare() {
            const tutors = JSON.parse(sessionStorage.getItem('compareList') || '[]');
            const container = document.getElementById('compareContent');

            if (tutors.length < 2) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size:3rem">🔍</div>
                        <h4 class="mt-3">Нечего сравнивать</h4>
                        <p>Выберите минимум 2 репетиторов на странице поиска.</p>
                        <a href="/student/tutors.html" class="btn btn-primary mt-2">Перейти к поиску</a>
                    </div>`;
                return;
            }

            // Определяем лучшие значения
            const maxExp = Math.max(...tutors.map(t => t.experience));

            // Заголовки колонок
            const headers = tutors.map(t => `
                <th>
                    <div class="tutor-name">${t.last_name} ${t.first_name}</div>
                    ${t.middle_name ? `<div style="font-weight:400;opacity:.8;font-size:.85rem">${t.middle_name}</div>` : ''}
                    <div class="mt-2">
                        <a href="/student/apply.html?tutor_id=${t.id}"
                           class="btn btn-light btn-sm text-primary fw-bold">
                            Отправить заявку
                        </a>
                    </div>
                </th>
            `).join('');

            // Строки таблицы
            const rows = [
                {
                    label: '🎂 Возраст',
                    render: t => `${t.age} лет`
                },
                {
                    label: '📚 Опыт',
                    render: t => {
                        const isBest = t.experience === maxExp;
                        return `<span class="${isBest ? 'best-val' : ''}">${t.experience} ${pluralYears(t.experience)}</span>`;
                    }
                },
                {
                    label: '🎓 Предметы',
                    render: t => t.subjects.length
                        ? t.subjects.map(s => `<span class="badge-subject">${s.name}</span>`).join('')
                        : '<span class="text-muted">—</span>'
                },
                {
                    label: '📝 О себе',
                    render: t => t.about
                        ? `<span style="font-size:.9rem">${t.about}</span>`
                        : '<span class="text-muted">Не указано</span>'
                },
            ];

            const tableRows = rows.map(row => `
                <tr>
                    <td class="row-label">${row.label}</td>
                    ${tutors.map(t => `<td>${row.render(t)}</td>`).join('')}
                </tr>
            `).join('');

            container.innerHTML = `
                <div class="mb-3 text-muted small">
                    Сравнивается ${tutors.length} репетитора. 
                    <a href="/student/tutors.html">Изменить выбор</a>
                </div>
                <div class="compare-table">
                    <table class="table table-bordered mb-0">
                        <thead>
                            <tr>
                                <th class="row-label" style="background:#343a40"></th>
                                ${headers}
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>
                </div>
                <div class="mt-3 text-end">
                    <button onclick="clearAndBack()" class="btn btn-outline-secondary btn-sm">
                        Очистить и вернуться к поиску
                    </button>
                </div>
            `;
        }

        function clearAndBack() {
            sessionStorage.removeItem('compareList');
            window.location.href = '/student/tutors.html';
        }

        renderCompare();
    </script>
</body>
</html>
