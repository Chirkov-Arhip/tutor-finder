<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заявка — TutorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .template-btn {
            font-size: 0.82rem;
            border-radius: 20px;
            padding: 4px 14px;
            margin: 3px 3px 3px 0;
            cursor: pointer;
            border: 1.5px solid #0d6efd;
            color: #0d6efd;
            background: transparent;
            transition: all 0.15s;
        }
        .template-btn:hover, .template-btn.selected {
            background: #0d6efd;
            color: #fff;
        }
        .date-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .date-row input[type="date"] {
            flex: 1;
        }
        .section-hint {
            font-size: 0.8rem;
            color: #6c757d;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary position-relative">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/images/icon.png" alt="TutorFinder">
            </a>
            <a class="navbar-brand position-absolute start-50 translate-middle-x" href="/">TutorFinder</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/student/tutors.html">Назад</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="mb-4">Отправить заявку</h2>
                <div id="error" class="alert alert-danger d-none"></div>
                <div id="success" class="alert alert-success d-none"></div>
                <form id="applyForm">

                    <!-- Предмет -->
                    <div class="mb-3">
                        <label class="form-label">Выберите предмет</label>
                        <select id="subject_id" class="form-select">
                            <option value="" disabled selected>Выберите предмет из списка</option>
                        </select>
                    </div>
                    <div class="mb-3" id="customSubjectDiv" style="display:none;">
                        <label class="form-label">Укажите свой предмет</label>
                        <input type="text" id="custom_subject" class="form-control"
                               placeholder="Например: Астрономия">
                    </div>

                    <!-- Сообщение -->
                    <div class="mb-1">
                        <label class="form-label">Сообщение репетитору <span class="text-muted">(необязательно)</span></label>
                        <div class="section-hint">Выберите шаблон или напишите своё:</div>
                        <div id="templateButtons"></div>
                    </div>
                    <div class="mb-3">
                        <textarea id="message" class="form-control" rows="3"
                                  placeholder="Ваше сообщение..."></textarea>
                    </div>

                    <!-- Предложение дат -->
                    <div class="mb-3">
                        <label class="form-label">Предложить даты занятий <span class="text-muted">(необязательно)</span></label>
                        <div class="section-hint">Укажите 1–3 удобные даты. Репетитор выберет подходящую.</div>
                        <div id="datesContainer">
                            <div class="date-row">
                                <input type="date" class="form-control proposed-date" id="date1">
                                <span class="text-muted small">1-й вариант</span>
                            </div>
                            <div class="date-row">
                                <input type="date" class="form-control proposed-date" id="date2">
                                <span class="text-muted small">2-й вариант</span>
                            </div>
                            <div class="date-row">
                                <input type="date" class="form-control proposed-date" id="date3">
                                <span class="text-muted small">3-й вариант</span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Отправить заявку</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/student.js"></script>
    <script>
        // Шаблоны сообщений
        const templates = [
            'Здравствуйте! Хочу заниматься с вами. Жду ответа.',
            'Добрый день! Ищу репетитора для подготовки к экзамену.',
            'Здравствуйте! Нужна помощь в подтягивании знаний по предмету.',
            'Добрый день! Интересует пробное занятие. Как это организовать?',
        ];

        const container = document.getElementById('templateButtons');
        templates.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'template-btn';
            btn.textContent = text;
            btn.addEventListener('click', () => {
                document.getElementById('message').value = text;
                document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
            container.appendChild(btn);
        });

        // Минимальная дата — сегодня
        const today = new Date().toISOString().split('T')[0];
        document.querySelectorAll('.proposed-date').forEach(inp => {
            inp.min = today;
        });

        // Перехватываем submit из student.js — добавляем message и dates
        const originalApply = window._applyOverride;

        // Переопределяем обработчик формы (student.js уже навесил свой через loadApplyPage)
        // Поэтому вешаем capture=true чтобы перехватить раньше
        document.getElementById('applyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            e.stopImmediatePropagation();

            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            errorDiv.classList.add('d-none');
            successDiv.classList.add('d-none');

            const userId = localStorage.getItem('user_id');
            const params = new URLSearchParams(window.location.search);
            const tutorId = params.get('tutor_id');
            const select = document.getElementById('subject_id');
            const customSubjectInput = document.getElementById('custom_subject');

            if (!select.value) {
                errorDiv.textContent = 'Пожалуйста выберите предмет';
                errorDiv.classList.remove('d-none');
                return;
            }
            if (select.value === 'custom' && !customSubjectInput.value.trim()) {
                errorDiv.textContent = 'Пожалуйста укажите свой предмет';
                errorDiv.classList.remove('d-none');
                return;
            }

            const studentResponse = await fetch(`/api/students/profile/${userId}`);
            const studentData = await studentResponse.json();

            const subjectId = select.value !== 'custom' ? parseInt(select.value) : null;
            const customSubject = select.value === 'custom' ? customSubjectInput.value.trim() : null;
            const message = document.getElementById('message').value.trim() || null;

            // Собираем даты
            const dates = [...document.querySelectorAll('.proposed-date')]
                .map(inp => inp.value)
                .filter(Boolean);
            const proposedDates = dates.length ? dates.join(', ') : null;

            const applyResponse = await fetch('/api/students/apply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    student_id: studentData.id,
                    tutor_id: parseInt(tutorId),
                    subject_id: subjectId,
                    custom_subject: customSubject,
                    message: message,
                    proposed_dates: proposedDates
                })
            });

            if (applyResponse.ok) {
                successDiv.textContent = 'Заявка отправлена!';
                successDiv.classList.remove('d-none');
                setTimeout(() => window.location.href = '/student/tutors.html', 1500);
            } else {
                const data = await applyResponse.json();
                errorDiv.textContent = data.detail;
                errorDiv.classList.remove('d-none');
            }
        }, true); // capture=true — срабатывает до обработчика из student.js
    </script>
</body>
</html>
