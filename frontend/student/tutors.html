<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Репетиторы — TutorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .filter-panel {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
            margin-bottom: 24px;
        }
        .filter-panel .row {
            align-items: flex-end;
        }
        .filter-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .compare-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0d6efd;
            color: #fff;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.15);
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .compare-bar.visible {
            transform: translateY(0);
        }
        .compare-bar .names {
            font-size: 0.9rem;
            opacity: 0.85;
        }
        .tutor-card {
            position: relative;
        }
        .compare-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 0.75rem;
        }
        .btn-compare {
            font-size: 0.8rem;
            padding: 4px 10px;
        }
        .btn-compare.active {
            background-color: #0d6efd;
            color: white;
            border-color: #0d6efd;
        }
        body { padding-bottom: 80px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary position-relative">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/images/icon.png" alt="TutorFinder">
            </a>
            <a class="navbar-brand position-absolute start-50 translate-middle-x" href="/">TutorFinder</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/profile.html">Профиль</a>
                <a class="nav-link" href="/support.html">Поддержка</a>
                <a class="nav-link" id="logoutBtn" href="#">Выйти</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-3">Найти репетитора</h2>

        <div class="filter-panel">
            <div class="row g-3">
                <div class="col-md-3">
                    <div class="filter-label">Предмет</div>
                    <select id="subjectFilter" class="form-select">
                        <option value="">Все предметы</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <div class="filter-label">Опыт от (лет)</div>
                    <input type="number" id="expMin" class="form-control" min="0" max="80" placeholder="0">
                </div>
                <div class="col-md-2">
                    <div class="filter-label">Опыт до (лет)</div>
                    <input type="number" id="expMax" class="form-control" min="0" max="80" placeholder="80">
                </div>
                <div class="col-md-2">
                    <div class="filter-label">Возраст от</div>
                    <input type="number" id="ageMin" class="form-control" min="18" max="120" placeholder="18">
                </div>
                <div class="col-md-2">
                    <div class="filter-label">Возраст до</div>
                    <input type="number" id="ageMax" class="form-control" min="18" max="120" placeholder="120">
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button onclick="loadTutors()" class="btn btn-primary w-100">Найти</button>
                </div>
            </div>
            <div class="mt-2">
                <button onclick="resetFilters()" class="btn btn-link btn-sm text-muted p-0">Сбросить фильтры</button>
            </div>
        </div>

        <div id="tutorsList" class="row"></div>
    </div>

    <!-- Панель сравнения -->
    <div class="compare-bar" id="compareBar">
        <div>
            <div class="fw-bold">Сравнение репетиторов</div>
            <div class="names" id="compareNames"></div>
        </div>
        <div class="d-flex gap-2">
            <button onclick="clearCompare()" class="btn btn-outline-light btn-sm">Очистить</button>
            <button onclick="goCompare()" class="btn btn-light btn-sm text-primary fw-bold">Сравнить →</button>
        </div>
    </div>

    <script src="/js/student.js"></script>
    <script>
        // Сравнение
        let compareList = JSON.parse(sessionStorage.getItem('compareList') || '[]');

        function updateCompareBar() {
            const bar = document.getElementById('compareBar');
            const names = document.getElementById('compareNames');
            if (compareList.length === 0) {
                bar.classList.remove('visible');
            } else {
                bar.classList.add('visible');
                names.textContent = compareList.map(t => t.last_name + ' ' + t.first_name).join(', ');
            }
            // Обновляем кнопки
            document.querySelectorAll('.btn-compare').forEach(btn => {
                const id = parseInt(btn.dataset.id);
                const inList = compareList.some(t => t.id === id);
                btn.textContent = inList ? '✓ В сравнении' : 'Сравнить';
                btn.classList.toggle('active', inList);
            });
        }

        function toggleCompare(tutor) {
            const idx = compareList.findIndex(t => t.id === tutor.id);
            if (idx > -1) {
                compareList.splice(idx, 1);
            } else {
                if (compareList.length >= 3) {
                    alert('Можно сравнивать не более 3 репетиторов');
                    return;
                }
                compareList.push(tutor);
            }
            sessionStorage.setItem('compareList', JSON.stringify(compareList));
            updateCompareBar();
        }

        function clearCompare() {
            compareList = [];
            sessionStorage.removeItem('compareList');
            updateCompareBar();
        }

        function goCompare() {
            if (compareList.length < 2) {
                alert('Выберите минимум 2 репетиторов для сравнения');
                return;
            }
            window.location.href = '/student/compare.html';
        }

        function resetFilters() {
            document.getElementById('subjectFilter').value = '';
            document.getElementById('expMin').value = '';
            document.getElementById('expMax').value = '';
            document.getElementById('ageMin').value = '';
            document.getElementById('ageMax').value = '';
            loadTutors();
        }

        // Перегружаем loadTutors с расширенными фильтрами
        async function loadTutors() {
            const subjectId = document.getElementById('subjectFilter')?.value;
            const expMin = document.getElementById('expMin')?.value;
            const expMax = document.getElementById('expMax')?.value;
            const ageMin = document.getElementById('ageMin')?.value;
            const ageMax = document.getElementById('ageMax')?.value;

            const params = new URLSearchParams();
            if (subjectId) params.append('subject_id', subjectId);
            if (expMin) params.append('experience_min', expMin);
            if (expMax) params.append('experience_max', expMax);
            if (ageMin) params.append('age_min', ageMin);
            if (ageMax) params.append('age_max', ageMax);

            const response = await fetch('/api/students/tutors?' + params.toString());
            const tutors = await response.json();
            const container = document.getElementById('tutorsList');
            if (!container) return;

            if (tutors.length === 0) {
                container.innerHTML = '<p class="text-muted">Репетиторы не найдены</p>';
                updateCompareBar();
                return;
            }

            container.innerHTML = tutors.map(t => {
                const inCompare = compareList.some(c => c.id === t.id);
                return `
                <div class="col-md-4 mb-3">
                    <div class="card h-100 tutor-card">
                        <div class="card-body">
                            <h5 class="card-title">${t.last_name} ${t.first_name} ${t.middle_name || ''}</h5>
                            <p class="text-muted mb-1"><small>Возраст: ${t.age} лет &nbsp;·&nbsp; Опыт: ${t.experience} ${pluralYears(t.experience)}</small></p>
                            <p class="mb-2">${t.subjects.map(s =>
                                `<span class="badge bg-primary me-1">${s.name}</span>`
                            ).join('')}</p>
                            <p class="text-muted small mb-3">${t.about || ''}</p>
                            <div class="d-flex gap-2">
                                <a href="/student/apply.html?tutor_id=${t.id}"
                                   class="btn btn-outline-primary btn-sm flex-grow-1">Отправить заявку</a>
                                <button class="btn btn-outline-secondary btn-sm btn-compare ${inCompare ? 'active' : ''}"
                                        data-id="${t.id}"
                                        onclick='toggleCompare(${JSON.stringify(t)})'>
                                    ${inCompare ? '✓ В сравнении' : 'Сравнить'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');

            updateCompareBar();
        }

        function pluralYears(n) {
            if (n % 10 === 1 && n % 100 !== 11) return 'год';
            if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'года';
            return 'лет';
        }

        updateCompareBar();
        loadTutors();
    </script>
</body>
</html>
