<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль — TutorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary position-relative">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/images/icon.png" alt="TutorFinder">
            </a>
            <a class="navbar-brand position-absolute start-50 translate-middle-x" href="/">TutorFinder</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/support.html">Техподдержка</a>
                <a class="nav-link" id="dashboardBtn" href="#">Мой кабинет</a>
                <a class="nav-link" id="logoutBtn" href="#">Выйти</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="mb-4">Мой профиль</h2>
                <div id="error" class="alert alert-danger d-none"></div>
                <div id="success" class="alert alert-success d-none"></div>
                <form id="profileForm">
                    <div class="mb-3">
                        <label class="form-label">Фамилия</label>
                        <input type="text" id="last_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Имя</label>
                        <input type="text" id="first_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Отчество</label>
                        <input type="text" id="middle_name" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Возраст</label>
                        <input type="number" id="age" class="form-control" min="1" max="120" required>
                    </div>
                    <div id="experienceDiv" class="mb-3 d-none">
                        <label class="form-label">Опыт преподавания (лет)</label>
                        <input type="number" id="experience" class="form-control" min="0" max="80">
                    </div>
                    <div id="subjectsDiv" class="mb-3 d-none">
                        <label class="form-label">Предметы</label>
                        <div id="subjectsList" class="row mb-2"></div>
                        <label class="form-label">Свой предмет</label>
                        <input type="text" id="custom_subject" class="form-control"
                               placeholder="Например: Астрономия">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">О себе</label>
                        <textarea id="about" class="form-control" rows="4"></textarea>
                    </div>
                    <hr>
                    <h5>Сменить пароль</h5>
                    <p class="text-muted small">Заполните только если хотите изменить пароль</p>
                    <div class="mb-3">
                        <label class="form-label">Новый пароль</label>
                        <input type="password" id="new_password" class="form-control">
                    </div>
                    <hr>
                    <h5>Подтверждение</h5>
                    <p class="text-muted small">Введите текущий пароль для сохранения изменений</p>
                    <div class="mb-3">
                        <label class="form-label">Текущий пароль <span class="text-danger">*</span></label>
                        <input type="password" id="current_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Сохранить изменения</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/profile.js"></script>
</body>
</html>
