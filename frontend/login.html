<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — TutorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary position-relative">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/images/icon.png" alt="TutorFinder">
            </a>
            <a class="navbar-brand position-absolute start-50 translate-middle-x" href="/">TutorFinder</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/login.html">Войти</a>
                <a class="nav-link" href="/register.html">Регистрация</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <h2 class="mb-4">Вход</h2>
                <div id="error" class="alert alert-danger d-none"></div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
                <p class="mt-3 text-center">Нет аккаунта? <a href="/register.html">Зарегистрироваться</a></p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
