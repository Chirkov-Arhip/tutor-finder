<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Техподдержка — TutorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary position-relative">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/images/icon.png" alt="TutorFinder">
            </a>
            <a class="navbar-brand position-absolute start-50 translate-middle-x" href="/">TutorFinder</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/profile.html">Профиль</a>
                <a class="nav-link" id="dashboardBtn" href="#">Мой кабинет</a>
                <a class="nav-link" id="logoutBtn" href="#">Выйти</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="mb-2">Техническая поддержка</h2>
                <p class="text-muted mb-4">Опишите вашу проблему и мы свяжемся с вами</p>
                <div id="error" class="alert alert-danger d-none"></div>
                <div id="success" class="alert alert-success d-none"></div>
                <form id="supportForm">
                    <div class="mb-3">
                        <label class="form-label">Тема обращения</label>
                        <input type="text" id="subject" class="form-control"
                               placeholder="Кратко опишите проблему" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea id="description" class="form-control" rows="6"
                                  placeholder="Подробно опишите что произошло" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Отправить обращение</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/support.js"></script>
</body>
</html>
