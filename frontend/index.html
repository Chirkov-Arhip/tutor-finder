<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TutorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .hero {
            min-height: 100vh;
            background-image: url('/images/logo.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: 600px;
            position: relative;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            padding-top: 60px;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-brand img {
            width: 35px;
            height: 35px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">TutorFinder</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/login.html">Войти</a>
                <a class="nav-link" href="/register.html">Регистрация</a>
            </div>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-content text-center">
            <h1 class="display-4 fw-bold">Найди своего репетитора</h1>
            <p class="lead text-muted mb-4">
                Онлайн платформа для подбора репетиторов по любым предметам
            </p>
            <a href="/register.html" class="btn btn-primary btn-lg me-2">Начать</a>
            <a href="/login.html" class="btn btn-outline-primary btn-lg">Войти</a>
        </div>
    </div>
</body>
</html>
